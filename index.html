<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="应用大本营">
  
  <title>离线应用大本营</title>
  
  <style>
    body {
      margin: 0; 
      /* 核心：Padding 加上苹果安全区域变量，让内容和背景色完美塞满状态栏和底部黑条 */
      padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
      background-color: #0b0f19; color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      box-sizing: border-box;
      /* 锁死高度，不让大本营在手机里上下乱晃 */
      height: 100vh;
      overflow: hidden;
    }
    h2 { margin: 0 0 5px 0; font-size: 20px; color: #a78bfa; text-align: center; }
    .subtitle { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 20px; }
    
    /* 隐藏的真实文件按钮，用漂亮的外壳包裹 */
    .import-btn {
      display: block; background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white; text-align: center; padding: 12px;
      border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 20px;
      font-size: 14px; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
    }
    
    /* 应用九宫格列表 */
    .app-grid {
      display: grid; grid-template-columns: repeat(3, 1xl);
      grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 15px;
    }
    .app-card {
      background-color: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 15px 10px; text-align: center;
      cursor: pointer; position: relative; display: flex; flex-direction: column;
      align-items: center; gap: 8px; transition: transform 0.1s;
    }
    .app-card:active { transform: scale(0.95); }
    .app-icon {
      width: 45px; height: 45px; background: #334155; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: white;
    }
    .app-name { font-size: 12px; color: #cbd5e1; font-weight: 500; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    /* 按钮样式：删除和编辑 */
    .del-btn, .edit-btn {
      position: absolute; top: -5px; width: 22px; height: 22px; 
      border-radius: 50%; font-size: 10px; display: flex; 
      align-items: center; justify-content: center; color: white; 
      border: 2px solid #1e293b; font-weight: bold; z-index: 10;
    }
    .del-btn { right: -5px; background: #ef4444; }
    .edit-btn { left: -5px; background: #3b82f6; }
    
    .btn-group {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .btn-group > * { flex: 1; margin-bottom: 0 !important; }

    /* 【核心独立窗口层】不用 height: 100vh，改成四周 0 绝对锁死，强行压榨全屏死角 */
    #previewContainer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      background: #0b0f19; /* 变成和大本营一样的深色，防止用户切换时闪白眼 */
      z-index: 99999; display: none;
    }
    #previewFrame { width: 100%; height: 100%; border: none; }

    /* 【核心悬浮退出球】利用 env() 自动长眼，避开不同 iPhone 的刘海区域 */
    #exitBall {
      position: fixed; 
      top: calc(15px + env(safe-area-inset-top)); 
      right: 20px; 
      width: 44px; 
      height: 44px;
      background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px); border-radius: 50%; z-index: 100000;
      display: none; align-items: center; justify-content: center;
      font-size: 16px; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      user-select: none; -webkit-user-select: none;
    }
  </style>
</head>
<body>

  <h2>📦 我的离线应用大本营</h2>
  <div class="subtitle">在此无限导入HTML，打造属于你自己的桌面盒</div>

  <div class="btn-group">
    <label class="import-btn">
      📁 文件导入
      <input type="file" id="installer" accept=".html,.htm" multiple style="display: none;">
    </label>
    <div class="import-btn" onclick="readClipboard()" style="background: linear-gradient(135deg, #10b981, #3b82f6);">
      📋 剪贴板导入
    </div>
  </div>

  <div class="app-grid" id="appGrid"></div>

  <div id="previewContainer">
    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <div id="exitBall" onclick="exitApp()">🔙</div>

  <script>
    let db;
    const grid = document.getElementById('appGrid');
    const installer = document.getElementById('installer');
    const container = document.getElementById('previewContainer');
    const frame = document.getElementById('previewFrame');
    const exitBall = document.getElementById('exitBall');

    // 1. 初始化原生的 IndexedDB 永久本地数据库
    const request = indexedDB.open("AppCampDB", 1);
    request.onupgradeneeded = e => {
      db = e.target.result;
      db.createObjectStore("apps", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; renderList(); };

    // 辅助：保存应用到DB
    function saveApp(name, code) {
      const transaction = db.transaction(["apps"], "readwrite");
      transaction.objectStore("apps").add({
        name: name || "未命名应用",
        code: code,
        icon: ["🎨","⏰","📅","🕹️","🎵","📝","🧮"][Math.floor(Math.random()*7)]
      });
      transaction.oncomplete = () => renderList();
    }

    // 2. 监听文件导入
    installer.addEventListener('change', async function(e) {
      for (const file of Array.from(e.target.files)) {
        const code = await file.text();
        const defaultName = file.name.replace(/\.html?$/i, '');
        const name = prompt(`请输入应用 "${defaultName}" 的名称:`, defaultName);
        if (name !== null) saveApp(name, code);
      }
      this.value = '';
    });

    // 剪贴板导入逻辑
    async function readClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (text.includes('<html') || text.includes('<!DOCTYPE')) {
          const name = prompt("检测到HTML代码，请输入应用名称:", "剪贴板应用");
          if (name !== null) saveApp(name, text);
        } else {
          alert("剪贴板内容似乎不是有效的HTML代码");
        }
      } catch (err) {
        alert("无法读取剪贴板，请确保已授权访问");
      }
    }

    // 3. 渲染本地已存好的 HTML 列表
    function renderList() {
      grid.innerHTML = '';
      const transaction = db.transaction(["apps"], "readonly");
      transaction.objectStore("apps").getAll().onsuccess = e => {
        const apps = e.target.result;
        apps.forEach(app => {
          const card = document.createElement('div');
          card.className = 'app-card';
          card.innerHTML = `
            <div class="edit-btn" onclick="renameApp(event, ${app.id}, '${app.name}')">✎</div>
            <div class="del-btn" onclick="deleteApp(event, ${app.id})">✕</div>
            <div class="app-icon">${app.icon}</div>
            <div class="app-name">${app.name}</div>
          `;
          card.onclick = () => launchApp(app.id);
          grid.appendChild(card);
        });
      };
    }

    // 4. 点一下就开！—— 提取本地代码，塞进大窗户放映
    function launchApp(id) {
      const transaction = db.transaction(["apps"], "readonly");
      transaction.objectStore("apps").get(id).onsuccess = e => {
        const app = e.target.result;
        
        // 关键：将代码转化为局部放映的数据源
        const blob = new Blob([app.code], { type: 'text/html;charset=utf-8' });
        const blobUrl = URL.createObjectURL(blob);
        
        frame.src = blobUrl;
        container.style.display = 'block';
        exitBall.style.display = 'flex'; // 唤醒退出球
      };
    }

    // 5. 退出机制：点退出球，砸掉放映窗口，完美退回大本营主页
    function exitApp() {
      container.style.display = 'none';
      exitBall.style.display = 'none';
      if(frame.src) URL.revokeObjectURL(frame.src);
      frame.src = 'about:blank';
    }

    // 6. 移除某个本地应用
    window.deleteApp = function(e, id) {
      e.stopPropagation();
      if(confirm("⚠️ 确定要彻底删除这个应用吗？此操作不可撤销。")) {
        const transaction = db.transaction(["apps"], "readwrite");
        transaction.objectStore("apps").delete(id).onsuccess = () => renderList();
      }
    };

    // 7. 重命名应用
    window.renameApp = function(e, id, oldName) {
      e.stopPropagation();
      const newName = prompt("请输入新的应用名称:", oldName);
      if (newName && newName !== oldName) {
        const transaction = db.transaction(["apps"], "readwrite");
        const store = transaction.objectStore("apps");
        store.get(id).onsuccess = (ev) => {
          const data = ev.target.result;
          data.name = newName;
          store.put(data).onsuccess = () => renderList();
        };
      }
    };
  </script>
</body>
</html>
